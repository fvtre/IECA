{% extends "base.html" %}

{% block content %}
<main class="container">
    <div class="row">
        {% for task in tasks %}
            <div class="col-md-4 mt-4">  <!-- Cada publicación ocupa 4 columnas -->
                <div class="card">
                    {% if task.image %}
                    <img src="{{ task.image.url }}" alt="Imagen de la tarjeta" class="card__image">
                    {% endif %}
                    <div class="card__content">
                        <h2 class="card__title">{{ task.title }}</h2>                        
                        <p class="card__description">{{ task.description }}</p>
                        <p><strong>Creado por</strong> {{ task.user.username }}</p>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
    <style>
        .card {
            position: relative;
            width: 300px;
            height: 200px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.320, 1);
        }
        
        .card__image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.6s cubic-bezier(0.23, 1, 0.320, 1);
        }
        
        .card__content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            background: radial-gradient(
            circle at left, 
            #d5ab01 10%, transparent 60%
        ),
        radial-gradient(
            circle at top , 
            #aa0200 30%, transparent 60%
        ),
        radial-gradient(
            circle at right, 
            #1f508b 20%, transparent 60%
        ),
        radial-gradient(
            circle at bottom, 
            #51337d 40%, transparent 60%
        );
            opacity: 0;
            text-align: center;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.320, 1);
        }
        
        .card__title {
            margin: 0;
            font-size: 24px;
            color: #333;
            font-weight: 700;
        }
        
        .card__description {
            margin: 10px 0 0;
            font-size: 14px;
            color: #777;
            line-height: 1.4;
        }
        
        /* Efecto hover */
        .card:hover {
            transform: rotate(-5deg) scale(1.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .card:hover .card__image {
            opacity: 0;
        }
        
        .card:hover .card__content {
            transform: translate(-50%, -50%) rotate(0deg);
            opacity: 1;
        }
        </style>
</main>
{% endblock %}
